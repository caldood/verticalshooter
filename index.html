<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#04030f">
<title>Moon Shot — Galaxy Market Raider</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #04030f;
    overflow: hidden;
    font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    color: #e8f4ff;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% -10%, #171043 0%, #0a0722 42%, #04030f 100%);
  }
  #stage {
    position: relative;
    width: 400px; height: 700px;
    max-width: 100vw; max-height: 100vh;
    aspect-ratio: 400 / 700;
    box-shadow: 0 0 70px rgba(80, 120, 255, 0.35), 0 0 0 1px rgba(120,180,255,0.14) inset;
    border-radius: 16px;
    overflow: hidden;
    background: #060417;
  }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  /* ---- Translucent glass on-screen controls ---- */
  #controls { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
  .btn {
    position: absolute; bottom: 20px;
    width: 76px; height: 76px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: bold;
    color: rgba(200,232,255,0.92);
    background: linear-gradient(155deg, rgba(120,180,255,0.16), rgba(40,60,130,0.10));
    border: 1px solid rgba(150,200,255,0.30);
    box-shadow: 0 4px 22px rgba(40,80,200,0.28), inset 0 1px 12px rgba(160,200,255,0.20);
    backdrop-filter: blur(8px) saturate(1.2);
    -webkit-backdrop-filter: blur(8px) saturate(1.2);
    pointer-events: auto;
    transition: transform .07s, background .12s, box-shadow .12s;
  }
  .btn:active {
    transform: scale(0.9);
    background: linear-gradient(155deg, rgba(150,205,255,0.34), rgba(60,90,180,0.22));
    box-shadow: 0 0 26px rgba(90,160,255,0.5), inset 0 0 16px rgba(170,210,255,0.35);
  }
  #btnLeft  { left: 18px; }
  #btnRight { left: 104px; }
  #btnFire  {
    right: 18px; width: 92px; height: 92px; bottom: 16px; font-size: 22px; letter-spacing: 1px;
    color: rgba(190,255,220,0.95);
    background: linear-gradient(155deg, rgba(60,230,150,0.20), rgba(20,120,80,0.12));
    border-color: rgba(110,255,190,0.45);
    box-shadow: 0 4px 24px rgba(30,200,120,0.30), inset 0 1px 12px rgba(140,255,200,0.28);
  }
  #btnFire:active {
    background: linear-gradient(155deg, rgba(90,255,180,0.40), rgba(30,160,100,0.26));
    box-shadow: 0 0 30px rgba(60,240,150,0.55), inset 0 0 16px rgba(160,255,210,0.4);
  }

  /* ---- Translucent glass overlays ---- */
  .overlay {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 30px;
    background: radial-gradient(ellipse at 50% 32%, rgba(30,24,74,0.55), rgba(4,3,15,0.74));
    backdrop-filter: blur(6px) saturate(1.15);
    -webkit-backdrop-filter: blur(6px) saturate(1.15);
  }
  .overlay.hidden { display: none; }
  .glass {
    padding: 34px 30px 30px;
    border-radius: 22px;
    background: linear-gradient(160deg, rgba(120,160,255,0.10), rgba(30,40,90,0.06));
    border: 1px solid rgba(150,200,255,0.20);
    box-shadow: 0 10px 50px rgba(20,40,120,0.45), inset 0 1px 20px rgba(150,200,255,0.10);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
  }
  .title {
    font-size: 52px; font-weight: 900; letter-spacing: 2px; line-height: 0.98;
    background: linear-gradient(180deg, #b6f5d0 0%, #5ad2ff 45%, #7a7dff 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 26px rgba(90,200,255,0.45));
    margin-bottom: 8px;
  }
  .subtitle { font-size: 13px; color: #8fd8c0; letter-spacing: 4px; margin-bottom: 26px; text-transform: uppercase; }
  .go-title {
    font-size: 50px; font-weight: 900; letter-spacing: 1px;
    background: linear-gradient(180deg, #ffd27a 0%, #ff7ba0 55%, #b85bff 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 26px rgba(255,120,150,0.45));
  }
  .play-btn {
    margin-top: 14px; pointer-events: auto; font-family: inherit;
    font-size: 21px; font-weight: 800; letter-spacing: 2px;
    color: #032013; padding: 15px 44px; border: none; border-radius: 40px; cursor: pointer;
    background: linear-gradient(180deg, #8affc4, #23c98a);
    box-shadow: 0 0 30px rgba(50,220,140,0.6), 0 6px 0 rgba(20,110,70,0.6);
    transition: transform .08s, box-shadow .1s;
  }
  .play-btn:active { transform: translateY(4px); box-shadow: 0 0 30px rgba(50,220,140,0.6), 0 2px 0 rgba(20,110,70,0.6); }
  .hint { margin-top: 22px; font-size: 12px; color: #7fa6c8; line-height: 1.8; letter-spacing: .5px; }
  .hint b { color: #8affc4; }
  .stat-line { font-size: 18px; color: #cfe6ff; margin: 7px 0; letter-spacing: 1px; }
  .stat-line b { color: #8affc4; }
  .best { color:#8fd8c0; font-size: 13px; letter-spacing: 2px; margin-top: 10px; }
  @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }
  .blink { animation: pulse 1.5s infinite; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="400" height="700"></canvas>

    <div id="controls">
      <div class="btn" id="btnLeft">◀</div>
      <div class="btn" id="btnRight">▶</div>
      <div class="btn" id="btnFire">BUY</div>
    </div>

    <!-- Start screen -->
    <div class="overlay" id="startScreen">
      <div class="glass">
        <div class="title">MOON<br>SHOT</div>
        <div class="subtitle">Galaxy Market Raider</div>
        <button class="play-btn" id="startBtn">▶ LAUNCH</button>
        <div class="hint">
          <b>Drag</b> to move on touch · <b>◀ ▶</b> keys on desktop · auto-fire on<br>
          Break <b>shields</b>, dodge <b>orbiters</b> &amp; survive the <b>🐋 whale</b><br>
          Grab <b>🎯 homing</b>, <b>» pierce</b>, <b>🛰 drones</b>, <b>×2</b> &amp; <b>💥</b> across 5 sectors<br>
          Send your portfolio <b>to the moon</b> 🚀
        </div>
        <div class="best" id="bestStart"></div>
      </div>
    </div>

    <!-- Game over screen -->
    <div class="overlay hidden" id="overScreen">
      <div class="glass">
        <div class="go-title">MARGIN CALL</div>
        <div class="stat-line" id="finalScore" style="margin-top:18px;">Portfolio: <b>$0</b></div>
        <div class="stat-line" id="finalLevel">Tier Reached: <b>1</b></div>
        <div class="best" id="bestOver"></div>
        <button class="play-btn" id="restartBtn" style="margin-top:22px;">↻ TRADE AGAIN</button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
"use strict";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = 400, H = 700;

// ---------- Utility ----------
const rand = (a, b) => a + Math.random() * (b - a);
const randInt = (a, b) => Math.floor(rand(a, b + 1));
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const dist2 = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; };
const TAU = Math.PI * 2;
function money(n) {
  if (n >= 1e6) return "$" + (n / 1e6).toFixed(2) + "M";
  if (n >= 1e3) return "$" + (n / 1e3).toFixed(1) + "K";
  return "$" + n;
}

// ---------- Audio ----------
const Sound = (function () {
  let actx = null, enabled = true;
  function ensure() {
    if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { enabled = false; } }
    if (actx && actx.state === "suspended") actx.resume();
  }
  function tone(freq, dur, type, vol, slideTo) {
    if (!enabled) return; ensure(); if (!actx) return;
    const t = actx.currentTime;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || "square";
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(30, slideTo), t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol || 0.15, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  return {
    resume: ensure,
    shoot() { tone(920, 0.08, "square", 0.05, 500); },
    enemyShoot() { tone(300, 0.12, "sawtooth", 0.045, 150); },
    explode() { tone(180, 0.28, "sawtooth", 0.13, 40); },
    bigExplode() { tone(110, 0.55, "sawtooth", 0.2, 28); },
    hit() { tone(210, 0.1, "square", 0.1, 90); },
    coin() { tone(1180, 0.08, "triangle", 0.1, 1760); },
    power() { tone(660, 0.14, "triangle", 0.12, 1320); },
    level() { tone(523, 0.16, "triangle", 0.12, 1046); }
  };
})();

// ---------- Starfield + ambient finance glyphs ----------
const stars = [];
const glyphs = [];
const GLYPH_CHARS = ["$", "%", "€", "¢", "£", "₿"];
function initStars() {
  stars.length = 0;
  for (let i = 0; i < 140; i++) {
    const layer = randInt(0, 2);
    stars.push({
      x: rand(0, W), y: rand(0, H),
      r: layer === 0 ? rand(0.4, 0.9) : layer === 1 ? rand(0.9, 1.5) : rand(1.5, 2.4),
      sp: layer === 0 ? rand(16, 28) : layer === 1 ? rand(38, 62) : rand(78, 116),
      tw: rand(0, TAU),
      hue: Math.random() < 0.18 ? rand(150, 300) : 210
    });
  }
  glyphs.length = 0;
  for (let i = 0; i < 12; i++) {
    glyphs.push({
      x: rand(0, W), y: rand(0, H),
      sp: rand(18, 40), size: rand(12, 26),
      ch: GLYPH_CHARS[randInt(0, GLYPH_CHARS.length - 1)],
      up: Math.random() < 0.5, tw: rand(0, TAU)
    });
  }
}
// ---------- Sector palettes (background varies between stages) ----------
const SECTORS = [
  { name: "DEEP SPACE",     base: [6, 4, 23],  neb: [[70,190,150],[180,60,150],[50,120,210]], star: 212, chart: [60,230,150] },
  { name: "BULL NEBULA",    base: [7, 20, 14], neb: [[60,220,120],[230,200,70],[90,255,170]], star: 150, chart: [90,255,150] },
  { name: "BEAR TERRITORY", base: [24, 7, 11], neb: [[220,70,70],[150,40,90],[255,120,90]],   star: 8,   chart: [255,100,100] },
  { name: "CRYPTO SECTOR",  base: [5, 11, 27], neb: [[60,200,255],[200,70,255],[90,255,240]], star: 196, chart: [90,220,255] },
  { name: "GOLDEN VAULT",   base: [24, 17, 5], neb: [[255,205,70],[230,150,50],[255,235,130]],star: 44,  chart: [255,215,90] }
];
let sectorIdx = 0, palBlend = 1;
let prevPal = SECTORS[0], tgtPal = SECTORS[0];
function sectorForLevel(l) { return Math.floor((l - 1) / 2) % SECTORS.length; }
function curPal() {
  const t = palBlend;
  const li = (a, b) => a.map((v, i) => v + (b[i] - v) * t);
  return {
    base: li(prevPal.base, tgtPal.base),
    neb: prevPal.neb.map((c, i) => li(c, tgtPal.neb[i])),
    star: prevPal.star + (tgtPal.star - prevPal.star) * t,
    chart: li(prevPal.chart, tgtPal.chart)
  };
}
function applySector(idx, announce) {
  prevPal = { base: curPal().base, neb: curPal().neb, star: curPal().star, chart: curPal().chart };
  tgtPal = SECTORS[idx]; palBlend = 0; sectorIdx = idx;
  if (announce) bannerText("◆ " + tgtPal.name + " ◆", "rgb(" + tgtPal.chart.map(Math.round).join(",") + ")", 2.2);
}
function resetSector() { sectorIdx = 0; prevPal = SECTORS[0]; tgtPal = SECTORS[0]; palBlend = 1; }
const rgb = a => "rgb(" + a[0].toFixed(0) + "," + a[1].toFixed(0) + "," + a[2].toFixed(0) + ")";
const rgba = (a, al) => "rgba(" + a[0].toFixed(0) + "," + a[1].toFixed(0) + "," + a[2].toFixed(0) + "," + al + ")";

let nebulaOffset = 0, chartPhase = 0;
function drawBackground(dt) {
  if (palBlend < 1) palBlend = Math.min(1, palBlend + dt / 1.6);
  const P = curPal();

  ctx.fillStyle = rgb(P.base);
  ctx.fillRect(0, 0, W, H);

  // drifting translucent nebula blobs (sector-tinted)
  nebulaOffset += dt * 14;
  const nx = [88, 322, 200], nb = [-120, 130, 430], nr = [200, 210, 240], na = [0.13, 0.12, 0.13];
  for (let k = 0; k < 3; k++) {
    let y = ((nb[k] + nebulaOffset) % (H + 500)) - 250;
    const g = ctx.createRadialGradient(nx[k], y, 10, nx[k], y, nr[k]);
    g.addColorStop(0, rgba(P.neb[k], na[k])); g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }

  // stars (colored ones adopt the sector's accent hue)
  const shue = Math.round(P.star);
  for (const s of stars) {
    s.y += s.sp * dt; s.tw += dt * 4;
    if (s.y > H + 3) { s.y = -3; s.x = rand(0, W); }
    const tw = 0.55 + 0.45 * Math.sin(s.tw);
    ctx.fillStyle = s.hue === 210
      ? "rgba(210,230,255," + tw.toFixed(3) + ")"
      : "hsla(" + shue + ",90%,75%," + tw.toFixed(3) + ")";
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, TAU); ctx.fill();
  }

  // ambient floating finance glyphs (very translucent)
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  for (const g of glyphs) {
    g.y += g.sp * dt; g.tw += dt * 2;
    if (g.y > H + 20) { g.y = -20; g.x = rand(0, W); g.up = Math.random() < 0.5; g.ch = GLYPH_CHARS[randInt(0, GLYPH_CHARS.length - 1)]; }
    const a = (0.05 + 0.05 * (0.5 + 0.5 * Math.sin(g.tw)));
    ctx.font = "bold " + g.size.toFixed(0) + "px 'Trebuchet MS', sans-serif";
    ctx.fillStyle = g.up ? "rgba(90,255,170," + a.toFixed(3) + ")" : "rgba(255,110,140," + a.toFixed(3) + ")";
    ctx.fillText(g.ch, g.x, g.y);
  }

  // translucent rising "market chart" silhouette along the bottom
  chartPhase += dt * 22;
  drawChartSilhouette(P.chart);
}
function drawChartSilhouette(chart) {
  const baseY = H - 4;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0, H);
  const step = 26;
  let idx = Math.floor(chartPhase / step);
  for (let x = -((chartPhase % step)); x <= W + step; x += step, idx++) {
    const h = 26 + (Math.sin(idx * 1.3) * 0.5 + 0.5) * 46 + (Math.sin(idx * 0.37) * 0.5 + 0.5) * 40;
    ctx.lineTo(x, baseY - h);
  }
  ctx.lineTo(W + step, H);
  ctx.closePath();
  const g = ctx.createLinearGradient(0, H - 120, 0, H);
  g.addColorStop(0, rgba(chart, 0.11));
  g.addColorStop(1, rgba(chart, 0.02));
  ctx.fillStyle = g; ctx.fill();
  ctx.restore();
}

// ---------- Particles ----------
const particles = [];
function spawnExplosion(x, y, color, count, power) {
  count = count || 18; power = power || 1;
  for (let i = 0; i < count; i++) {
    const a = rand(0, TAU), sp = rand(40, 240) * power;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: rand(0.4, 0.9), max: 0.9, r: rand(1.5, 4) * power, color, drag: rand(1.5, 3) });
  }
}
function spawnSpark(x, y, color) {
  for (let i = 0; i < 4; i++) {
    const a = rand(0, TAU), sp = rand(30, 90);
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: rand(0.2, 0.4), max: 0.4, r: rand(1, 2), color, drag: 3 });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    const d = 1 - p.drag * dt; p.vx *= d; p.vy *= d;
    p.x += p.vx * dt; p.y += p.vy * dt;
  }
}
function drawParticles() {
  ctx.globalCompositeOperation = "lighter";
  for (const p of particles) {
    const a = clamp(p.life / p.max, 0, 1);
    ctx.globalAlpha = a; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (0.5 + a * 0.5), 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.globalCompositeOperation = "source-over";
}

// ---------- Game state ----------
const State = { START: 0, PLAY: 1, OVER: 2 };
let state = State.START;

const player = {
  x: W / 2, y: H - 92, w: 42, h: 46,
  speed: 330, cooldown: 0, fireRate: 0.2,
  lives: 4, invuln: 0, power: 1, thrust: 0, drones: [],
  weapon: "blaster", weaponTime: 0
};

let bullets = [], enemyBullets = [], enemies = [], powerups = [], coins = [];
let score = 0, level = 1, best = 0;
try { best = parseInt(localStorage.getItem("moonshot_best") || "0", 10) || 0; } catch (e) {}

let waveTimer = 0, levelKills = 0, killsForLevel = 12, shake = 0;
let scoreMult = 1, multTime = 0, flash = 0;

function addScore(n) { score += Math.round(n * scoreMult); }
const keys = { left: false, right: false, fire: false };
const touchMove = { active: false, x: 0 };

// ---------- Reset / fire ----------
function resetGame() {
  player.x = W / 2; player.y = H - 92;
  player.lives = 4; player.invuln = 0; player.power = 1;
  player.cooldown = 0; player.fireRate = 0.2; player.drones = [];
  bullets = []; enemyBullets = []; enemies = []; powerups = []; coins = []; particles.length = 0;
  score = 0; level = 1; levelKills = 0; killsForLevel = 12;
  waveTimer = 0.4; shake = 0;
  scoreMult = 1; multTime = 0; flash = 0;
  player.weapon = "blaster"; player.weaponTime = 0;
  bossActive = false; lastBossLevel = -1; banner.time = 0;
  resetSector();
}
function firePlayer() {
  Sound.shoot();
  const bx = player.x, by = player.y - 24;
  if (player.weapon === "homing") {
    // seeking missiles (count scales with leverage)
    const n = player.power >= 3 ? 3 : player.power;
    for (let k = 0; k < n; k++) {
      const off = (k - (n - 1) / 2) * 12;
      bullets.push({ x: bx + off, y: by, vx: rand(-50, 50), vy: -360, r: 4.5, life: 2.6, homing: true });
    }
  } else {
    const pierce = player.weapon === "pierce";
    const shots = [];
    if (player.power >= 3) shots.push({ x: bx, dx: 0 }, { x: bx - 13, dx: -70 }, { x: bx + 13, dx: 70 });
    else if (player.power === 2) shots.push({ x: bx - 8, dx: 0 }, { x: bx + 8, dx: 0 });
    else shots.push({ x: bx, dx: 0 });
    for (const s of shots) bullets.push({ x: s.x, y: by, vx: s.dx, vy: -600, r: pierce ? 5 : 4, life: 2, pierce });
  }
  // drone allies fire straight up
  const dp = player.weapon === "pierce";
  for (const d of player.drones) bullets.push({ x: d.x, y: d.y - 8, vx: 0, vy: -560, r: 3.5, life: 2, pierce: dp });
}

// ---------- Player ship (redesigned, translucent, animated) ----------
function drawPlayer(t) {
  ctx.save();
  ctx.translate(player.x, player.y);
  const bank = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
  ctx.rotate(bank * 0.16);

  // ---- twin engine thrust (translucent, flickering) ----
  ctx.globalCompositeOperation = "lighter";
  const flick = 0.6 + 0.4 * Math.sin(t * 40);
  for (const ex of [-8, 8]) {
    const flame = 12 + flick * 8 + player.thrust * 8;
    const fg = ctx.createLinearGradient(ex, 12, ex, 12 + flame + 16);
    fg.addColorStop(0, "rgba(180,255,235,0.85)");
    fg.addColorStop(0.45, "rgba(70,220,255,0.5)");
    fg.addColorStop(1, "rgba(70,150,255,0)");
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.moveTo(ex - 4.5, 12); ctx.lineTo(ex + 4.5, 12);
    ctx.lineTo(ex, 12 + flame + 14); ctx.closePath(); ctx.fill();
  }
  ctx.globalCompositeOperation = "source-over";

  const blink = player.invuln > 0 && Math.floor(player.invuln * 12) % 2 === 0;
  ctx.globalAlpha = blink ? 0.4 : 1;

  // ---- outer wings (translucent glass) ----
  ctx.save();
  ctx.shadowColor = "#3ec6ff"; ctx.shadowBlur = 14;
  const wingGrad = ctx.createLinearGradient(-24, 0, 24, 0);
  wingGrad.addColorStop(0, "rgba(60,150,255,0.30)");
  wingGrad.addColorStop(0.5, "rgba(150,225,255,0.55)");
  wingGrad.addColorStop(1, "rgba(60,150,255,0.30)");
  ctx.fillStyle = wingGrad;
  ctx.beginPath();
  ctx.moveTo(-8, -2); ctx.lineTo(-24, 12); ctx.lineTo(-19, 16); ctx.lineTo(-7, 10); ctx.closePath();

// ---------- Enemies (finance-themed bears/volatility) ----------
// grunt=dip, diver=short, gunner=bear, tank=crash, weaver=volatility,
// splitter=bull trap, splitling=fragment, boss=whale
function makeEnemy(type, x, y) {
  const base = { x, y, type, r: 16, hp: 1, t: rand(0, TAU), fireCd: rand(1.2, 3.2),
    homeX: x, homeY: y, vx: 0, vy: 0, points: 100, entering: true, enterDelay: 0 };
  if (type === "grunt")    { base.hp = 1; base.r = 15; base.color = "#ff5b7e"; base.points = 100; }
  if (type === "diver")    { base.hp = 1; base.r = 15; base.color = "#ff9f43"; base.points = 150; }
  if (type === "gunner")   { base.hp = 2; base.r = 17; base.color = "#ff6b3d"; base.points = 200; base.fireCd = rand(0.8, 1.8); }
  if (type === "tank")     { base.hp = 6; base.r = 24; base.color = "#e0397a"; base.points = 500; base.fireCd = rand(1.5, 2.5); }
  if (type === "weaver")   { base.hp = 2; base.r = 15; base.color = "#3dd7d0"; base.points = 220; base.fireCd = rand(1.0, 2.2); base.weaveAmp = rand(30, 60); base.weavePh = rand(0, TAU); }
  if (type === "splitter") { base.hp = 2; base.r = 17; base.color = "#8be04a"; base.points = 180; base.fireCd = rand(1.4, 2.8); }
  if (type === "splitling"){ base.hp = 1; base.r = 9;  base.color = "#b6ff6a"; base.points = 60;  base.fireCd = rand(1.2, 2.6); }
  if (type === "shielder") { base.hp = 3; base.r = 17; base.color = "#6b8bff"; base.points = 260; base.fireCd = rand(1.2, 2.4); base.shield = 3; base.shieldMax = 3; base.shieldRegen = 0; }
  if (type === "orbiter")  { base.hp = 3; base.r = 16; base.color = "#ff8be0"; base.points = 300; base.fireCd = rand(2.0, 3.2); }
  if (type === "boss")     { base.hp = 40 + level * 8; base.r = 46; base.color = "#c46bff"; base.points = 3000; base.fireCd = 1.2; base.bossPhase = 0; base.spin = 0; base.strafe = rand(0, TAU); }
  base.maxHp = base.hp;
  return base;
}
let formationTime = 0, lastBossLevel = -1, bossActive = false;
function spawnWave() {
  // Boss encounter every 3rd tier
  if (level >= 3 && level % 3 === 0 && lastBossLevel !== level) {
    lastBossLevel = level;
    const boss = makeEnemy("boss", W / 2, -70);
    boss.homeX = W / 2; boss.homeY = 96; boss.enterDelay = 0;
    enemies.push(boss);
    bossActive = true;
    // a couple of escorts
    for (const ex of [-70, 70]) {
      const e = makeEnemy("gunner", W / 2 + ex, -60);
      e.homeX = W / 2 + ex; e.homeY = 170; e.enterDelay = 0.4;
      enemies.push(e);
    }
    bannerText("⚠ WHALE INCOMING ⚠", "#ff6bd0", 2.4);
    return;
  }

  const cols = clamp(4 + Math.floor(level / 2), 4, 8);
  const startX = (W - (cols - 1) * 46) / 2;
  const rowTypes = ["grunt"];
  if (level >= 2) rowTypes.push(Math.random() < 0.5 ? "gunner" : "weaver");
  if (level >= 3) rowTypes.push(Math.random() < 0.5 ? "gunner" : "splitter");
  if (level >= 4 && Math.random() < 0.6) rowTypes.push("diver");
  if (level >= 4) rowTypes.push(Math.random() < 0.5 ? "shielder" : "orbiter");
  if (level >= 5 && Math.random() < 0.5) rowTypes.push("weaver");
  if (level >= 6 && Math.random() < 0.5) rowTypes.push("orbiter");
  const rows = rowTypes.length;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let type = rowTypes[r];
      if (type === "grunt" && Math.random() < 0.1 + level * 0.02) type = "diver";
      if (type === "grunt" && Math.random() < 0.08) type = "splitter";
      const hx = startX + c * 46, hy = 78 + r * 44;
      const e = makeEnemy(type, hx, -40 - c * 12 - r * 30);
      e.homeX = hx; e.homeY = hy; e.enterDelay = c * 0.05 + r * 0.12;
      enemies.push(e);
    }
  }
  if (level >= 4 && Math.random() < 0.4) {
    const e = makeEnemy("tank", W / 2, -60);
    e.homeX = W / 2; e.homeY = 56; e.enterDelay = 0;
    enemies.push(e);
  }
}
function aimedBullet(e, sp, r) {
  const dx = player.x - e.x, dy = player.y - e.y, d = Math.hypot(dx, dy) || 1;
  enemyBullets.push({ x: e.x, y: e.y + e.r, vx: dx / d * sp, vy: dy / d * sp, r: r || 4.5, color: e.color });
}
function enemyFire(e) {
  if (e.type === "grunt" || e.type === "diver" || e.type === "splitter" || e.type === "splitling") {
    if (Math.random() < 0.6) { enemyBullets.push({ x: e.x, y: e.y + e.r, vx: 0, vy: 195, r: 4, color: e.color }); Sound.enemyShoot(); }
  } else if (e.type === "gunner") {
    aimedBullet(e, 235); Sound.enemyShoot();
  } else if (e.type === "shielder") {
    aimedBullet(e, 205); Sound.enemyShoot();
  } else if (e.type === "orbiter") {
    // radial ring burst
    for (let k = 0; k < 8; k++) {
      const a = k / 8 * TAU + e.t;
      enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 145, vy: Math.sin(a) * 145 + 45, r: 4.5, color: e.color });
    }
    Sound.enemyShoot();
  } else if (e.type === "weaver") {
    // twin angled shots
    enemyBullets.push({ x: e.x, y: e.y + e.r, vx: -70, vy: 200, r: 4, color: e.color });
    enemyBullets.push({ x: e.x, y: e.y + e.r, vx: 70, vy: 200, r: 4, color: e.color });
    Sound.enemyShoot();
  } else if (e.type === "tank") {
    for (let a = -0.35; a <= 0.35; a += 0.35)
      enemyBullets.push({ x: e.x, y: e.y + e.r, vx: Math.sin(a) * 205, vy: Math.cos(a) * 205, r: 5, color: e.color });
    Sound.enemyShoot();
  }
}
// Boss attack patterns, cycled by phase
function bossFire(e, dt) {
  e.spin += dt * 1.5;
  e.bossAtkCd = (e.bossAtkCd || 0) - dt;
  if (e.bossAtkCd > 0) return;
  const phase = e.bossPhase % 3;
  if (phase === 0) {
    // rotating spiral (3 arms, slower)
    for (let k = 0; k < 3; k++) {
      const a = e.spin + k * (TAU / 3);
      enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 115, vy: Math.abs(Math.sin(a)) * 70 + 95, r: 5, color: "#ff9be8" });
    }
    e.bossAtkCd = 0.24;
    e.bossShots = (e.bossShots || 0) + 1;
    if (e.bossShots > 9) { e.bossShots = 0; e.bossPhase++; e.bossAtkCd = 1.5; }
  } else if (phase === 1) {
    // aimed 5-shot burst (slower, fewer repeats)
    const dx = player.x - e.x, dy = player.y - e.y;
    const ba = Math.atan2(dy, dx);
    for (let s = -2; s <= 2; s++) {
      const a = ba + s * 0.18;
      enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 200, vy: Math.sin(a) * 200, r: 5, color: "#ffd0f2" });
    }
    Sound.enemyShoot();
    e.bossAtkCd = 0.72;
    e.bossShots = (e.bossShots || 0) + 1;
    if (e.bossShots > 2) { e.bossShots = 0; e.bossPhase++; e.bossAtkCd = 1.3; }
  } else {
    // gentle wall sweep (5 bullets, slower)
    for (let x = -0.9; x <= 0.9; x += 0.45)
      enemyBullets.push({ x: e.x, y: e.y, vx: Math.sin(x) * 100, vy: 165, r: 5, color: "#c46bff" });
    Sound.enemyShoot();
    e.bossAtkCd = 0.8;
    e.bossShots = (e.bossShots || 0) + 1;
    if (e.bossShots > 3) { e.bossShots = 0; e.bossPhase++; e.bossAtkCd = 1.5; }
  }
}
function updateEnemies(dt) {
  formationTime += dt;
  const sway = Math.sin(formationTime * 0.9) * 26;
  const bob = Math.sin(formationTime * 1.6) * 6;
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i]; e.t += dt;
    if (e.entering) {
      e.enterDelay -= dt;
      if (e.enterDelay <= 0) {
        e.y += (e.homeY - e.y) * clamp(dt * 3.2, 0, 1) + 40 * dt;
        e.x += (e.homeX - e.x) * clamp(dt * 3.2, 0, 1);
        if (Math.abs(e.y - e.homeY) < 3 && Math.abs(e.x - e.homeX) < 3) e.entering = false;
      }
    } else if (e.type === "boss") {
      // strafe horizontally, bob vertically, run attack patterns
      e.strafe += dt * 0.7;
      e.x = W / 2 + Math.sin(e.strafe) * 118;
      e.y = e.homeY + Math.sin(e.strafe * 1.7) * 10;
      bossFire(e, dt);
    } else {
      if (e.type === "shielder" && e.shield < e.shieldMax) {
        e.shieldRegen -= dt;
        if (e.shieldRegen <= 0) { e.shield = e.shieldMax; } // full recharge after being left alone
      }
      let weave = 0;
      if (e.type === "weaver") weave = Math.sin(e.t * 2.4 + e.weavePh) * e.weaveAmp;
      const targetX = e.homeX + sway + weave, targetY = e.homeY + bob;
      e.x += (targetX - e.x) * clamp(dt * 4, 0, 1);
      e.y += (targetY - e.y) * clamp(dt * 4, 0, 1);
      if (e.type === "diver" && !e.diving && Math.random() < 0.004) e.diving = true;
      if (e.diving) {
        const dx = player.x - e.x;
        e.x += clamp(dx, -120, 120) * dt * 1.6; e.y += 195 * dt;
        if (e.y > H + 30) { enemies.splice(i, 1); continue; }
      }
      e.fireCd -= dt;
      if (e.fireCd <= 0) {
        e.fireCd = rand(1.4, 3.4) - level * 0.08;
        if (e.y > 20 && e.y < H - 120) enemyFire(e);
      }
    }
  }
}

    ctx.fillStyle = "#7a2fb8";
    for (const px of [-30, 0, 30]) { ctx.beginPath(); ctx.ellipse(px, -30, 8, 10, 0, 0, TAU); ctx.fill(); }
    // glowing eyes
    ctx.globalCompositeOperation = "lighter";
    const eye = 0.6 + 0.4 * Math.sin(e.t * 8);
    ctx.fillStyle = "rgba(255,80,150," + eye.toFixed(2) + ")";
    ctx.shadowColor = "#ff5090"; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.arc(-14, -4, 5, 0, TAU); ctx.arc(14, -4, 5, 0, TAU); ctx.fill();
    ctx.globalCompositeOperation = "source-over"; ctx.shadowBlur = 0;
    // mouth / $ maw
    ctx.fillStyle = "#2a0a44";
    ctx.beginPath(); ctx.ellipse(0, 14, 18, 8, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = "#ffd24a";
    ctx.font = "bold 15px 'Trebuchet MS'"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("$$$", 0, 14);
  }
  ctx.restore();
}

// ---------- Coins (finance collectible) ----------
function spawnCoins(x, y, n) {
  for (let i = 0; i < n; i++) {
    coins.push({ x: x + rand(-8, 8), y: y + rand(-8, 8), vx: rand(-40, 40), vy: rand(-30, 40),
      r: 9, t: rand(0, TAU), value: 25 });
  }
}
function updateCoins(dt) {
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.vy += 120 * dt; // gravity down
    // magnet toward player when close
    const d = Math.hypot(player.x - c.x, player.y - c.y);
    if (d < 110) { c.vx += (player.x - c.x) / d * 300 * dt; c.vy += (player.y - c.y) / d * 300 * dt; }
    c.x += c.vx * dt; c.y += c.vy * dt; c.t += dt * 6;
    if (c.y > H + 20) { coins.splice(i, 1); continue; }
    if (dist2(player.x, player.y, c.x, c.y) < (14 + c.r) * (14 + c.r)) {
      addScore(c.value); Sound.coin();
      spawnSpark(c.x, c.y, "#ffd24a");
      floatText(c.x, c.y, "+" + money(Math.round(c.value * scoreMult)), "#ffd24a");
      coins.splice(i, 1);
    }
  }
}
function drawCoins() {
  for (const c of coins) {
    const sx = Math.abs(Math.cos(c.t)); // spin
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(clamp(sx, 0.18, 1), 1);
    ctx.shadowColor = "#ffcf3a"; ctx.shadowBlur = 12;
    const g = ctx.createRadialGradient(-2, -2, 1, 0, 0, c.r);
    g.addColorStop(0, "#fff3b0"); g.addColorStop(0.6, "#ffc93a"); g.addColorStop(1, "#c98a10");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, c.r, 0, TAU); ctx.fill();
    ctx.restore();
    if (sx > 0.4) {
      ctx.fillStyle = "rgba(120,80,0,0.9)";
      ctx.font = "bold 11px 'Trebuchet MS'"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("$", c.x, c.y + 0.5);
    }
  }
}

// ---------- Power-ups ----------
const POWER_TABLE = [
  ["power", 0.15], ["rapid", 0.12], ["shield", 0.11], ["multi", 0.12],
  ["drone", 0.10], ["bomb", 0.10], ["heart", 0.12], ["homing", 0.09], ["pierce", 0.09]
];
function spawnPowerup(x, y) {
  let roll = Math.random(), acc = 0, kind = "power";
  for (const [k, w] of POWER_TABLE) { acc += w; if (roll < acc) { kind = k; break; } }
  powerups.push({ x, y, vy: 68, r: 14, kind, t: rand(0, TAU) });
}
function powerupStyle(kind) {
  if (kind === "rapid")  return { col: "#5bff9f", label: "⚡" };
  if (kind === "shield") return { col: "#5bc8ff", label: "🛡" };
  if (kind === "heart")  return { col: "#ff5b8b", label: "♥" };
  if (kind === "multi")  return { col: "#ffb14a", label: "×2" };
  if (kind === "drone")  return { col: "#b18bff", label: "🛰" };
  if (kind === "bomb")   return { col: "#ff5b5b", label: "💥" };
  if (kind === "homing") return { col: "#ff8b3d", label: "🎯" };
  if (kind === "pierce") return { col: "#5ad2ff", label: "»" };
  return { col: "#ffd24a", label: "📈" };
}
function drawPowerup(p) {
  const st = powerupStyle(p.kind);
  ctx.save();
  ctx.translate(p.x, p.y);
  const pulse = 1 + Math.sin(p.t * 5) * 0.12;
  ctx.scale(pulse, pulse);
  ctx.shadowColor = st.col; ctx.shadowBlur = 16;
  ctx.strokeStyle = st.col; ctx.lineWidth = 2.5;
  ctx.fillStyle = "rgba(10,14,34,0.45)";
  ctx.beginPath(); ctx.arc(0, 0, 13, 0, TAU); ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.font = "13px 'Trebuchet MS', sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = st.col;
  ctx.fillText(st.label, 0, 1);
  ctx.restore();
}
function addDrone() {
  if (player.drones.length >= 2) { multTime = Math.max(multTime, 0); return false; }
  const side = player.drones.length === 0 ? -1 : 1;
  player.drones.push({ side, ph: rand(0, TAU), x: player.x, y: player.y });
  return true;
}
function detonateBomb() {
  flash = 0.7; shake = 18; Sound.bigExplode();
  enemyBullets.length = 0; // clear incoming fire
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.type === "boss") {
      e.hp -= Math.ceil(e.maxHp * 0.22);
      spawnExplosion(e.x, e.y, "#ffd24a", 24, 1.4);
      continue;
    }
    addScore(Math.round(e.points * 0.5));
    spawnExplosion(e.x, e.y, e.color, 16, 1.1);
    spawnCoins(e.x, e.y, 1);
    levelKills++;
    enemies.splice(i, 1);
  }
}
function applyPowerup(p) {
  Sound.power();
  const st = powerupStyle(p.kind);
  spawnExplosion(p.x, p.y, st.col, 12, 0.7);
  if (p.kind === "power")  { player.power = clamp(player.power + 1, 1, 3); floatText(p.x, p.y, "LEVERAGE UP", "#ffd24a"); }
  else if (p.kind === "rapid")  { player.fireRate = Math.max(0.09, player.fireRate - 0.05); floatText(p.x, p.y, "HIGH-FREQ", "#5bff9f"); }
  else if (p.kind === "shield") { player.invuln = Math.max(player.invuln, 4); floatText(p.x, p.y, "HEDGE", "#5bc8ff"); }
  else if (p.kind === "heart")  { player.lives = clamp(player.lives + 1, 0, 6); floatText(p.x, p.y, "+1 LIFE", "#ff5b8b"); }
  else if (p.kind === "multi")  { scoreMult = 2; multTime = 12; bannerText("BULL RUN ×2 📈", "#ffb14a", 1.6); }
  else if (p.kind === "drone")  { addDrone() ? floatText(p.x, p.y, "ALLY DRONE", "#b18bff") : floatText(p.x, p.y, "+" + money(300), "#b18bff"); if (player.drones.length >= 2) addScore(300); }
  else if (p.kind === "bomb")   { bannerText("BAILOUT! 💥", "#ff5b5b", 1.4); detonateBomb(); }
  else if (p.kind === "homing") { player.weapon = "homing"; player.weaponTime = 12; floatText(p.x, p.y, "HOMING", "#ff8b3d"); bannerText("HOMING MISSILES 🎯", "#ff8b3d", 1.5); }
  else if (p.kind === "pierce") { player.weapon = "pierce"; player.weaponTime = 12; floatText(p.x, p.y, "PIERCE", "#5ad2ff"); bannerText("BLUE-CHIP PIERCE »", "#5ad2ff", 1.5); }
}

// ---------- Banner (centered callouts) ----------
let banner = { text: "", color: "#fff", time: 0, max: 0 };
function bannerText(text, color, dur) { banner = { text, color, time: dur, max: dur }; }
function drawBanner() {
  if (banner.time <= 0) return;
  ctx.save();
  const k = banner.time / banner.max;
  ctx.globalAlpha = clamp(banner.time, 0, 1) * clamp(k * 3, 0, 1);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = banner.color; ctx.shadowColor = banner.color; ctx.shadowBlur = 22;
  ctx.font = "bold 26px 'Trebuchet MS', sans-serif";
  ctx.fillText(banner.text, W / 2, H / 2 - 70);
  ctx.restore();
}

// ---------- Floating text ----------
const floats = [];
function floatText(x, y, text, color) { floats.push({ x, y, text, color, life: 1.1, max: 1.1 }); }
function updateFloats(dt) {
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i]; f.life -= dt; f.y -= 26 * dt;
    if (f.life <= 0) floats.splice(i, 1);
  }
}
function drawFloats() {
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = "bold 13px 'Trebuchet MS', sans-serif";
  for (const f of floats) {
    ctx.globalAlpha = clamp(f.life / f.max, 0, 1);
    ctx.fillStyle = f.color; ctx.shadowColor = f.color; ctx.shadowBlur = 8;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

// ---------- Bullets ----------
function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (b.homing) {
      // steer toward nearest enemy ahead
      let best = null, bd = 1e9;
      for (const e of enemies) {
        if (e.y > b.y + 30) continue;
        const d = dist2(b.x, b.y, e.x, e.y);
        if (d < bd) { bd = d; best = e; }
      }
      if (best) {
        const want = Math.atan2(best.y - b.y, best.x - b.x);
        const cur = Math.atan2(b.vy, b.vx);
        let da = want - cur;
        while (da > Math.PI) da -= TAU;
        while (da < -Math.PI) da += TAU;
        const na = cur + clamp(da, -4 * dt, 4 * dt);
        const sp = Math.hypot(b.vx, b.vy);
        b.vx = Math.cos(na) * sp; b.vy = Math.sin(na) * sp;
      }
    }
    b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
    if (b.life <= 0 || b.y < -14 || b.y > H + 14 || b.x < -14 || b.x > W + 14) bullets.splice(i, 1);
  }
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.y > H + 10 || b.y < -10 || b.x < -10 || b.x > W + 10) enemyBullets.splice(i, 1);
  }
}
function drawBullets() {
  // player shots (additive glow), styled per weapon
  ctx.globalCompositeOperation = "lighter";
  for (const b of bullets) {
    if (b.homing) {
      // orange seeking missile
      ctx.fillStyle = "#ffd0a0"; ctx.shadowColor = "#ff8b3d"; ctx.shadowBlur = 12;
      const ang = Math.atan2(b.vy, b.vx) + Math.PI / 2;
      ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(ang);
      ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(4, 6); ctx.lineTo(-4, 6); ctx.closePath(); ctx.fill();
      ctx.restore();
    } else if (b.pierce) {
      // cyan piercing lance
      ctx.fillStyle = "#d6f6ff"; ctx.shadowColor = "#5ad2ff"; ctx.shadowBlur = 14;
      ctx.fillRect(b.x - 2, b.y - 12, 4, 20);
    } else {
      // green bullish bolt
      ctx.fillStyle = "#c8ffdf"; ctx.shadowColor = "#3dff9a"; ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y - 10);
      ctx.lineTo(b.x + 3, b.y + 5);
      ctx.lineTo(b.x, b.y + 2);
      ctx.lineTo(b.x - 3, b.y + 5);
      ctx.closePath(); ctx.fill();
    }
  }
  ctx.globalCompositeOperation = "source-over";
  ctx.shadowBlur = 0;

  // enemy bullets — high-contrast so they read against nebula/stars:
  // colored glowing halo + dark separation ring + white-hot core
  for (const b of enemyBullets) {
    const col = b.color || "#ff5b5b";
    const R = b.r + 2.5;
    ctx.shadowColor = col; ctx.shadowBlur = 14;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(b.x, b.y, R, 0, TAU); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.lineWidth = 1.5; ctx.strokeStyle = "rgba(15,8,24,0.9)";
    ctx.beginPath(); ctx.arc(b.x, b.y, R, 0, TAU); ctx.stroke();
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(b.x, b.y, R * 0.42, 0, TAU); ctx.fill();
  }
}

// ---------- Collisions ----------
function handleCollisions() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (dist2(e.x, e.y, b.x, b.y) < (e.r + b.r) * (e.r + b.r)) {
        if (b.pierce) { if (b.lastHit === e) continue; b.lastHit = e; }
        else bullets.splice(j, 1);
        spawnSpark(b.x, b.y, "#c8ffdf"); Sound.hit();
        // shielder: front shield absorbs the hit and regenerates when left alone
        if (e.type === "shielder" && e.shield > 0) { e.shield--; e.shieldRegen = 3.5; spawnSpark(b.x, b.y, "#9fc0ff"); break; }
        e.hp -= 1;
        if (e.hp <= 0) {
          addScore(e.points); levelKills++;
          floatText(e.x, e.y - 6, "+" + money(Math.round(e.points * scoreMult)), "#8affc4");
          if (e.type === "boss") {
            spawnExplosion(e.x, e.y, e.color, 60, 2.4);
            spawnExplosion(e.x, e.y, "#ffd24a", 40, 1.8);
            Sound.bigExplode(); shake = 20; flash = 0.6; bossActive = false;
            spawnCoins(e.x, e.y, 14);
            spawnPowerup(e.x - 20, e.y); spawnPowerup(e.x + 20, e.y);
            bannerText("WHALE LIQUIDATED! 🐋💰", "#ffd24a", 2.4);
          } else if (e.type === "splitter") {
            spawnExplosion(e.x, e.y, e.color, 16, 1);
            Sound.explode(); shake = Math.min(shake + 4, 16);
            for (const off of [-14, 14]) {
              const s = makeEnemy("splitling", e.x + off, e.y);
              s.entering = false; s.homeX = clamp(e.x + off * 2, 24, W - 24); s.homeY = e.y;
              s.vx = off * 3; enemies.push(s);
            }
            spawnCoins(e.x, e.y, 1);
          } else {
            const big = e.type === "tank";
            spawnExplosion(e.x, e.y, e.color, big ? 36 : 18, big ? 1.7 : 1);
            big ? Sound.bigExplode() : Sound.explode();
            shake = Math.min(shake + (big ? 11 : 4), 16);
            const elite = e.type === "gunner" || e.type === "weaver" || e.type === "shielder" || e.type === "orbiter";
            spawnCoins(e.x, e.y, big ? randInt(4, 6) : (elite ? randInt(1, 3) : (Math.random() < 0.6 ? 1 : 0)));
            const dropChance = e.type === "tank" ? 1 : elite ? 0.24 : 0.1;
            if (Math.random() < dropChance) spawnPowerup(e.x, e.y);
          }
          enemies.splice(i, 1);
        }
        break;
      }
    }
  }
  if (player.invuln <= 0) {
    for (let j = enemyBullets.length - 1; j >= 0; j--) {
      const b = enemyBullets[j];
      if (dist2(player.x, player.y, b.x, b.y) < (12 + b.r) * (12 + b.r)) { enemyBullets.splice(j, 1); damagePlayer(); break; }
    }
  }
  if (player.invuln <= 0) {
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (dist2(player.x, player.y, e.x, e.y) < (12 + e.r) * (12 + e.r)) {
        if (e.type !== "boss") { spawnExplosion(e.x, e.y, e.color, 20, 1.1); Sound.explode(); enemies.splice(i, 1); }
        damagePlayer(); break;
      }
    }
  }
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    if (dist2(player.x, player.y, p.x, p.y) < (14 + p.r) * (14 + p.r)) { applyPowerup(p); powerups.splice(i, 1); }
  }
}
function damagePlayer() {
  player.lives -= 1; player.invuln = 2.2; player.power = clamp(player.power - 1, 1, 3);
  spawnExplosion(player.x, player.y, "#7fd0ff", 26, 1.3); Sound.bigExplode(); shake = 16;
  if (player.lives <= 0) gameOver();
}

// ---------- HUD (translucent glass panels) ----------
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawHUD() {
  // translucent top glass bar
  ctx.save();
  roundRect(8, 8, W - 16, 46, 12);
  ctx.fillStyle = "rgba(16,22,54,0.42)";
  ctx.fill();
  ctx.lineWidth = 1; ctx.strokeStyle = "rgba(150,200,255,0.18)"; ctx.stroke();
  ctx.clip();
  const sheen = ctx.createLinearGradient(0, 8, 0, 30);
  sheen.addColorStop(0, "rgba(200,225,255,0.10)"); sheen.addColorStop(1, "rgba(200,225,255,0)");
  ctx.fillStyle = sheen; ctx.fillRect(8, 8, W - 16, 22);
  ctx.restore();

  // portfolio value
  ctx.textAlign = "left"; ctx.textBaseline = "top";
  ctx.fillStyle = "#7fb0d8"; ctx.font = "10px 'Trebuchet MS', sans-serif";
  ctx.fillText("PORTFOLIO", 20, 14);
  ctx.fillStyle = "#c8ffdf"; ctx.font = "bold 19px 'Trebuchet MS', sans-serif";
  ctx.shadowColor = "#3dff9a"; ctx.shadowBlur = 8;
  ctx.fillText(money(score), 20, 26);
  ctx.shadowBlur = 0;

  // tier (center)
  ctx.textAlign = "center";
  ctx.fillStyle = "#7fb0d8"; ctx.font = "10px 'Trebuchet MS', sans-serif";
  ctx.fillText("TIER", W / 2, 14);
  ctx.fillStyle = "#ffe27a"; ctx.font = "bold 19px 'Trebuchet MS', sans-serif";
  ctx.shadowColor = "#ffb24a"; ctx.shadowBlur = 8;
  ctx.fillText(String(level), W / 2, 26);
  ctx.shadowBlur = 0;

  // lives hearts (right)
  ctx.textAlign = "right";
  ctx.fillStyle = "#7fb0d8"; ctx.font = "10px 'Trebuchet MS', sans-serif";
  ctx.fillText("LIVES", W - 20, 14);
  for (let i = 0; i < player.lives; i++) drawHeart(W - 26 - i * 21, 36, 6.5, "#ff5b8b");

  // active-buff readout
  ctx.textAlign = "left"; ctx.font = "bold 10px 'Trebuchet MS', sans-serif";
  let bx = 20;
  function chip(txt, col) { ctx.fillStyle = col; ctx.fillText(txt, bx, 46); bx += ctx.measureText(txt).width + 10; }
  if (player.weapon === "homing") chip("🎯 " + Math.ceil(player.weaponTime) + "s", "#ff8b3d");
  if (player.weapon === "pierce") chip("PIERCE " + Math.ceil(player.weaponTime) + "s", "#5ad2ff");
  if (player.power > 1) chip("LVG×" + player.power, "#ffd24a");
  if (player.fireRate < 0.2) chip("HFT", "#5bff9f");
  if (multTime > 0) chip("BULL×2 " + Math.ceil(multTime) + "s", "#ffb14a");
  if (player.drones.length) chip("🛰×" + player.drones.length, "#b18bff");

  // boss health bar
  if (bossActive) {
    const boss = enemies.find(e => e.type === "boss");
    if (boss) {
      const bw = W - 40, bhp = clamp(boss.hp / boss.maxHp, 0, 1);
      ctx.save();
      roundRect(20, 58, bw, 9, 4); ctx.fillStyle = "rgba(20,10,30,0.6)"; ctx.fill();
      roundRect(20, 58, bw * bhp, 9, 4);
      const hg = ctx.createLinearGradient(20, 0, 20 + bw, 0);
      hg.addColorStop(0, "#ff6bd0"); hg.addColorStop(1, "#c46bff");
      ctx.fillStyle = hg; ctx.fill();
      ctx.restore();
      ctx.textAlign = "center"; ctx.fillStyle = "#ffd0f2"; ctx.font = "bold 9px 'Trebuchet MS', sans-serif";
      ctx.fillText("🐋 WHALE", W / 2, 60);
    }
  }

  // shield ring
  if (player.invuln > 0.05) {
    ctx.save();
    ctx.globalAlpha = 0.35 + 0.3 * Math.sin(formationTime * 12);
    ctx.strokeStyle = "#5bc8ff"; ctx.lineWidth = 2;
    ctx.shadowColor = "#5bc8ff"; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(player.x, player.y, 27, 0, TAU); ctx.stroke();
    ctx.restore();
  }
}
function drawHeart(cx, cy, s, color) {
  ctx.save(); ctx.translate(cx, cy);
  ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(0, s * 0.35);
  ctx.bezierCurveTo(0, -s * 0.1, -s, -s * 0.1, -s, s * 0.35);
  ctx.bezierCurveTo(-s, s * 0.9, 0, s * 1.1, 0, s * 1.4);
  ctx.bezierCurveTo(0, s * 1.1, s, s * 0.9, s, s * 0.35);
  ctx.bezierCurveTo(s, -s * 0.1, 0, -s * 0.1, 0, s * 0.35);
  ctx.fill(); ctx.restore();
}

// ---------- Level flow ----------
let levelBanner = 0;
function checkLevelUp() {
  if (levelKills >= killsForLevel) {
    level++; levelKills = 0; killsForLevel = 12 + level * 3;
    levelBanner = 2.2; Sound.level();
  }
}
function drawLevelBanner() {
  ctx.save();
  ctx.globalAlpha = clamp(levelBanner, 0, 1) * clamp(3 - levelBanner, 0, 1);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = "#ffe27a"; ctx.shadowColor = "#ffb24a"; ctx.shadowBlur = 20;
  ctx.font = "bold 34px 'Trebuchet MS', sans-serif";
  ctx.fillText("TIER " + level, W / 2, H / 2 - 46);
  ctx.font = "bold 15px 'Trebuchet MS', sans-serif"; ctx.fillStyle = "#8affc4"; ctx.shadowColor = "#3dff9a";
  ctx.fillText("BULL MARKET INTENSIFIES", W / 2, H / 2 - 22);
  ctx.restore();
}

// ---------- Loop ----------
let last = performance.now();
function frame(now) {
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.05) dt = 0.05;

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  let sx = 0, sy = 0;
  if (shake > 0) { sx = rand(-shake, shake) * 0.5; sy = rand(-shake, shake) * 0.5; shake = Math.max(0, shake - dt * 40); }
  ctx.setTransform(1, 0, 0, 1, sx, sy);

  drawBackground(dt);
  if (state === State.PLAY) update(dt);

  for (const p of powerups) drawPowerup(p);
  drawCoins();
  for (const e of enemies) drawEnemy(e);
  drawBullets();
  drawParticles();
  drawFloats();
  if (state !== State.OVER) { drawDrones(now / 1000); drawPlayer(now / 1000); }

  if (state === State.PLAY) {
    drawHUD();
    if (levelBanner > 0) drawLevelBanner();
    drawBanner();
  }

  // screen flash (bomb / boss death)
  if (flash > 0) {
    flash = Math.max(0, flash - dt * 1.6);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = "rgba(255,255,255," + (flash * 0.6).toFixed(3) + ")";
    ctx.fillRect(0, 0, W, H);
  }

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  requestAnimationFrame(frame);
}
function update(dt) {
  player.thrust = 0;
  if (touchMove.active) {
    // finger-follow (mobile): ship tracks touch x
    const tx = clamp(touchMove.x, 22, W - 22);
    const before = player.x;
    player.x += (tx - player.x) * clamp(dt * 16, 0, 1);
    if (Math.abs(tx - before) > 1.5) player.thrust = 1;
  } else {
    if (keys.left)  { player.x -= player.speed * dt; player.thrust = 1; }
    if (keys.right) { player.x += player.speed * dt; player.thrust = 1; }
  }
  player.x = clamp(player.x, 22, W - 22);
  if (player.invuln > 0) player.invuln -= dt;

  player.cooldown -= dt;
  if (player.cooldown <= 0) { firePlayer(); player.cooldown = player.fireRate; }

  if (multTime > 0) { multTime -= dt; if (multTime <= 0) { scoreMult = 1; multTime = 0; } }
  if (banner.time > 0) banner.time -= dt;

  updateBullets(dt);
  updateEnemies(dt);
  updateDrones(dt);
  updateParticles(dt);
  updateFloats(dt);
  updateCoins(dt);

  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i]; p.y += p.vy * dt; p.t += dt;
    if (p.y > H + 20) powerups.splice(i, 1);
  }

  if (player.weaponTime > 0) { player.weaponTime -= dt; if (player.weaponTime <= 0) { player.weapon = "blaster"; player.weaponTime = 0; } }

  handleCollisions();
  bossActive = enemies.some(e => e.type === "boss");
  checkLevelUp();
  const desiredSector = sectorForLevel(level);
  if (desiredSector !== sectorIdx) applySector(desiredSector, true);
  if (levelBanner > 0) levelBanner -= dt;

  if (enemies.length === 0) {
    waveTimer -= dt;
    if (waveTimer <= 0) { spawnWave(); waveTimer = 999; }
  } else waveTimer = 1.2;
}

// ---------- Screen flow ----------
const startScreen = document.getElementById("startScreen");
const overScreen = document.getElementById("overScreen");
document.getElementById("startBtn").addEventListener("click", startGame);
document.getElementById("restartBtn").addEventListener("click", startGame);

function updateBestLabels() {
  const t = best > 0 ? "BEST PORTFOLIO  " + money(best) : "";
  document.getElementById("bestStart").textContent = t;
  document.getElementById("bestOver").textContent = t;
}
function startGame() {
  Sound.resume(); resetGame(); spawnWave(); waveTimer = 999;
  state = State.PLAY;
  startScreen.classList.add("hidden"); overScreen.classList.add("hidden");
}
function gameOver() {
  state = State.OVER;
  if (score > best) { best = score; try { localStorage.setItem("moonshot_best", String(best)); } catch (e) {} }
  document.getElementById("finalScore").innerHTML = "Portfolio: <b>" + money(score) + "</b>";
  document.getElementById("finalLevel").innerHTML = "Tier Reached: <b>" + level + "</b>";
  updateBestLabels();
  setTimeout(() => overScreen.classList.remove("hidden"), 700);
}

// ---------- Input: keyboard ----------
window.addEventListener("keydown", (e) => {
  if (e.repeat) return;
  switch (e.code) {
    case "ArrowLeft": case "KeyA": keys.left = true; break;
    case "ArrowRight": case "KeyD": keys.right = true; break;
    case "Space":
      keys.fire = true;
      if (state === State.PLAY) player.cooldown = Math.min(player.cooldown, 0);
      else if (state === State.START) startGame();
      else if (state === State.OVER && !overScreen.classList.contains("hidden")) startGame();
      e.preventDefault(); break;
    case "Enter": if (state !== State.PLAY) startGame(); break;
  }
});
window.addEventListener("keyup", (e) => {
  switch (e.code) {
    case "ArrowLeft": case "KeyA": keys.left = false; break;
    case "ArrowRight": case "KeyD": keys.right = false; break;
    case "Space": keys.fire = false; break;
  }
});

// ---------- Input: touch buttons ----------
function bindHold(el, on, off) {
  const start = (e) => { e.preventDefault(); Sound.resume(); on(); };
  const end = (e) => { e.preventDefault(); off(); };
  el.addEventListener("touchstart", start, { passive: false });
  el.addEventListener("touchend", end, { passive: false });
  el.addEventListener("touchcancel", end, { passive: false });
  el.addEventListener("mousedown", start);
  window.addEventListener("mouseup", off);
}
bindHold(document.getElementById("btnLeft"),  () => keys.left = true,  () => keys.left = false);
bindHold(document.getElementById("btnRight"), () => keys.right = true, () => keys.right = false);
bindHold(document.getElementById("btnFire"),
  () => { keys.fire = true; if (state === State.PLAY) player.cooldown = Math.min(player.cooldown, 0); },
  () => keys.fire = false);
// Drag-to-move: touch anywhere on the playfield and the ship follows your finger
function canvasPointX(clientX) {
  const rect = canvas.getBoundingClientRect();
  return (clientX - rect.left) / rect.width * W;
}
canvas.addEventListener("touchstart", (e) => {
  Sound.resume();
  if (state === State.PLAY && e.touches[0]) {
    player.cooldown = Math.min(player.cooldown, 0);
    touchMove.active = true;
    touchMove.x = canvasPointX(e.touches[0].clientX);
  }
}, { passive: true });
canvas.addEventListener("touchmove", (e) => {
  if (touchMove.active && e.touches[0]) {
    touchMove.x = canvasPointX(e.touches[0].clientX);
    e.preventDefault();
  }
}, { passive: false });
function endCanvasTouch() { touchMove.active = false; }
canvas.addEventListener("touchend", endCanvasTouch, { passive: true });
canvas.addEventListener("touchcancel", endCanvasTouch, { passive: true });

// ---------- Boot ----------
initStars();
updateBestLabels();
requestAnimationFrame(frame);

})();
</script>
